<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Юлия Олейник — редактор и автор контента</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F9F9F9;
    --ink: #111111;
    --muted: #777777;
    --accent: #20B2AA;
    --accent-dark: #178A83;
    --accent-light: #E6F7F6;
    --border: #E5E5E5;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--ink); font-family: 'Golos Text', sans-serif; font-size: 16px; line-height: 1.7; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(249,249,249,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { font-family: 'Golos Text', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.04em; color: var(--ink); }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; letter-spacing: 0.02em; }
  .nav-links a:hover { color: var(--accent); }

  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; max-width: 1200px; margin: 0 auto; padding: 56px 40px 0; gap: 60px; align-items: center; }
  .hero-text { padding-top: 40px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-light); color: var(--accent-dark); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 40px; margin-bottom: 28px; }
  .hero-badge::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(34px, 4.5vw, 54px); font-weight: 900; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 8px; }
  h1 span { color: var(--accent); display: block; }
  .hero-role { font-size: 18px; color: var(--muted); margin-bottom: 28px; font-weight: 500; }
  .hero-bio { font-size: 16px; line-height: 1.8; color: #333; max-width: 480px; margin-bottom: 36px; }
  .hero-contacts { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-outline { background: transparent; color: var(--ink); border: 1.5px solid var(--border); }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .hero-visual { position: relative; display: flex; align-items: center; justify-content: center; padding-top: 56px; }
  .hero-photo-wrap { position: relative; width: 380px; height: 480px; }
  .hero-photo-bg { position: absolute; inset: 0; background: var(--accent-light); border-radius: 200px 200px 160px 160px; }
  .hero-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 200px 200px 160px 160px; filter: grayscale(100%); transition: filter 0.4s ease; }
  .hero-photo-wrap:hover .hero-photo { filter: grayscale(0%); }
  .hero-stat { position: absolute; background: white; border-radius: 16px; padding: 14px 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); font-size: 13px; }
  .hero-stat strong { display: block; font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1.2; }
  .hero-stat-1 { bottom: 40px; left: -20px; }
  .hero-stat-2 { top: 80px; right: -20px; }

  section { max-width: 1200px; margin: 0 auto; padding: 100px 40px; }
  .section-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 56px; }
  .section-num { font-family: 'Unbounded', sans-serif; font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: 0.1em; }
  h2 { font-family: 'Unbounded', sans-serif; font-size: clamp(24px, 3vw, 36px); font-weight: 900; letter-spacing: -0.02em; line-height: 1.1; }

  .cases-grid { display: grid; gap: 24px; }
  .case-card { background: var(--white); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: all 0.25s; }
  .case-card:hover { border-color: var(--accent); box-shadow: 0 8px 40px rgba(32,178,170,0.06); }
  .case-inner { padding: 40px 48px; display: grid; grid-template-columns: 320px 1fr; gap: 48px; align-items: flex-start; }
  .case-meta { display: flex; flex-direction: column; }
  .case-num { font-family: 'Unbounded', sans-serif; font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 12px; }
  .case-title { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 700; line-height: 1.3; }
  .case-meta-action { margin-top: 20px; }
  .case-body p { font-size: 15px; line-height: 1.75; margin-bottom: 20px; color: #333; }
  .case-items { list-style: none; margin: 0 0 24px; }
  .case-items li { font-size: 14.5px; padding: 12px 0 12px 16px; border-bottom: 1px solid var(--border); position: relative; color: #333; }
  .case-items li:first-child { border-top: 1px solid var(--border); }
  .case-items li::before { content: ''; position: absolute; left: 0; top: 22px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }
  .case-result { display: flex; align-items: flex-start; gap: 10px; background: var(--accent-light); padding: 14px 18px; border-radius: 12px; font-size: 14px; color: var(--accent-dark); line-height: 1.5; font-weight: 500; }
  .case-result::before { content: '✦'; font-size: 12px; margin-top: 2px; flex-shrink: 0; }
  .case-link-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; text-decoration: none; font-weight: 600; transition: all 0.2s; box-shadow: 0 4px 12px rgba(32, 178, 170, 0.15); }
  .case-link-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }

  .skills-section { background: var(--ink); }
  .skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #333; border: 1px solid #333; border-radius: 16px; overflow: hidden; margin-top: 56px; }
  .skill-block { background: #1A1A1A; padding: 36px; }
  .skill-block h3 { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
  .skill-block p { font-size: 14.5px; color: #AAAAAA; line-height: 1.7; }
  .cta-section { text-align: center; padding: 120px 40px; }
  .cta-title { font-family: 'Unbounded', sans-serif; font-size: clamp(26px, 3.5vw, 42px); font-weight: 900; margin: 0 auto 16px; }
  .divider { height: 1px; background: var(--border); max-width: 1200px; margin: 0 auto; }
</style>
</head>
<body>
